apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend-ventas
  labels:
    app: backend-ventas
spec:
  replicas: 2
  selector:
    matchLabels:
      app: backend-ventas
  template:
    metadata:
      labels:
        app: backend-ventas
    spec:
      containers:
      - name: backend
        image: 832247032595.dkr.ecr.us-east-1.amazonaws.com/backend:ventas
        env:
        - name: SPRING_DATASOURCE_URL
          value: "jdbc:mysql://db-service:3306/innovatech?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true"
        - name: SPRING_DATASOURCE_USERNAME
          value: "root"
        - name: SPRING_DATASOURCE_PASSWORD
          value: "root"
        ports:
        - containerPort: 8080
---
apiVersion: v1
kind: Service
metadata:
  name: backend-ventas-service
spec:
  selector:
    app: backend-ventas
  ports:
    - protocol: TCP
      port: 8080
      targetPort: 8080
